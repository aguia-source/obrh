items:
  - title: "Nossa Missão"
    content: |
      Proporcionar experiências imobiliárias excepcionais, conectando pessoas às suas futuras casas com transparência, ética e compromisso.
  - title: "Nossos Valores"
    content: |
      **Transparência**: Mantemos nossos clientes e colaboradores informados em cada etapa do processo.

      **Ética**: Agimos com integridade em todas as nossas relações comerciais.

      **Compromisso**: Entregamos resultados que superam expectativas.

      **Inovação**: Buscamos constantemente melhorias em nossos processos e atendimento.

      **Respeito**: Valorizamos cada pessoa como única e primordial em nossa história.
  - title: "Visão"
    content: |
      Ser a referência nacional em consultoria imobiliária, reconhecida pela excelência no atendimento e inovação tecnológica.
  - title: "Nossa História"
    content: |
      A Águia Consultoria Imobiliária nasceu da união entre experiência de mercado e visão de futuro. Desde nossa fundação, trabalhamos com dedicação para construir relacionamentos duradouros com nossos clientes e colaboradores.

      Acreditamos que cada transação imobiliária é mais do que um negócio - é a realização de um sonho.
  - title: "Ambiente de Trabalho"
    content: |
      Valorizamos um ambiente colaborativo onde todas as ideias são ouvidas. Manter um local de trabalho limpo e organizado é fundamental para nossa produtividade.

      Respeitamos os horários de trabalho e valorizamos o equilíbrio entre vida pessoal e profissional.
  - title: "O que esperamos de você"
    content: |
      - Comprometimento com os resultados da equipe
      - Comunicação clara e transparente
      - Proatividade na resolução de problemas
      - Busca constante por conhecimento
      - Tratamento respeitoso com clientes e colegas
